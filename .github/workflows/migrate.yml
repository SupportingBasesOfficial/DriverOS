name: Supabase Migrate

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run migrations
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f..."
            psql "${{ secrets.SUPABASE_DB_URL }}" -f "$f"
          done
